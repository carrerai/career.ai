<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Career Guide{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #ffffff;
            --gray-50: #f9f9f9;
            --gray-100: #f2f2f2;
            --gray-200: #e5e5e5;
            --gray-400: #a3a3a3;
            --gray-600: #525252;
            --gray-800: #262626;
            --accent: #1a1a1a;
            --border: rgba(0,0,0,0.08);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 6px rgba(0,0,0,0.04);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
            --radius-sm: 10px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 9999px;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'DM Sans', system-ui, sans-serif;
            --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
            --max-w: 1120px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--white);
            color: var(--black);
            font-family: var(--font-body);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 24px;
        }

        /* Header */
        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 14px 24px;
            transition: background var(--transition), box-shadow var(--transition);
        }

        .header.scrolled {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 1px 0 var(--border);
        }

        .header-container {
            max-width: var(--max-w);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255,255,255,0.95);
            border: 1px solid var(--border);
            border-radius: var(--radius-full);
            padding: 10px 10px 10px 24px;
            box-shadow: var(--shadow-sm);
            transition: box-shadow var(--transition);
        }

        .header-container:hover {
            box-shadow: var(--shadow-md);
        }

        .logo h1 {
            font-family: var(--font-display);
            font-size: 1.2rem;
            font-weight: 400;
            letter-spacing: -0.01em;
            color: var(--black);
        }

        .nav-menu ul {
            display: flex;
            list-style: none;
            gap: 4px;
            align-items: center;
        }

        .nav-menu ul li a {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-600);
            padding: 8px 14px;
            border-radius: var(--radius-full);
            transition: background var(--transition), color var(--transition);
            display: block;
        }

        .nav-menu ul li a:hover {
            background: var(--gray-100);
            color: var(--black);
        }

        .nav-cta {
            background: var(--black) !important;
            color: var(--white) !important;
            padding: 9px 20px !important;
            border-radius: var(--radius-full) !important;
            font-weight: 600 !important;
            font-size: 0.875rem !important;
            transition: opacity var(--transition), transform var(--transition) !important;
        }

        .nav-cta:hover {
            opacity: 0.85 !important;
            transform: translateY(-1px);
            background: var(--black) !important;
        }

        /* Hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            border-radius: var(--radius-sm);
            transition: background var(--transition);
            background: none;
            border: none;
        }

        .hamburger:hover { background: var(--gray-100); }

        .hamburger span {
            width: 22px;
            height: 2px;
            background: var(--black);
            border-radius: 2px;
            display: block;
            transition: transform var(--transition), opacity var(--transition);
        }

        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        /* Mobile sidebar */
        .mobile-sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: #000000;
            z-index: 2000;
            padding: 80px 32px 40px;
            box-shadow: var(--shadow-lg);
            transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .mobile-sidebar.open { right: 0; }

        .mobile-sidebar a {
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            transition: color var(--transition);
        }

        .mobile-sidebar a:hover { color: #cccccc; }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.3);
            z-index: 1500;
            opacity: 0;
            pointer-events: none;
            transition: opacity var(--transition);
            backdrop-filter: blur(4px);
        }

        .sidebar-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .hamburger { display: flex; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Header -->
    <header class="header" id="site-header">
        <div class="header-container">
            <div class="logo">
                <h1>CAREER.AI</h1>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li><a href="{% url 'home' %}">Home</a></li>
                    <li><a href="{% url 'home' %}#how">How It Works</a></li>
                    <li><a href="{% url 'start_test' %}" class="nav-cta">Take Test</a></li>
                </ul>
            </nav>
            <button class="hamburger" id="hamburger" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <!-- Mobile Sidebar -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <nav class="mobile-sidebar" id="mobile-sidebar">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'home' %}#how">How It Works</a>
        <a href="{% url 'start_test' %}">Take Test</a>
    </nav>

    <!-- Main Content -->
    <main style="padding-top: 80px;">
        {% block content %}{% endblock %}
    </main>

    <script>
        // Mobile menu toggle
        const hamburger = document.getElementById('hamburger');
        const mobileSidebar = document.getElementById('mobile-sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('open');
            mobileSidebar.classList.toggle('open');
            sidebarOverlay.classList.toggle('show');
        });

        sidebarOverlay.addEventListener('click', () => {
            hamburger.classList.remove('open');
            mobileSidebar.classList.remove('open');
            sidebarOverlay.classList.remove('show');
        });

        // Header scroll effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('site-header');
            if (window.scrollY > 50) {
                header.classList.add('scrolled');
            } else {
                header.classList.remove('scrolled');
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
